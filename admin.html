<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AXEL'S GPR Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f8fb;
      --surface: #ffffff;
      --text: #142234;
      --muted: #55677a;
      --line: #d9e3ee;
      --brand: #0f6d63;
      --brand-deep: #0b5049;
      --danger: #9b2230;
      --radius: 16px;
      --shadow: 0 12px 30px rgba(18, 34, 52, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Manrope', 'Segoe UI', sans-serif;
      background: linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
      color: var(--text);
    }

    .container {
      width: min(1180px, 92%);
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .title {
      margin: 0;
      font-size: clamp(1.4rem, 3vw, 2rem);
      letter-spacing: -0.01em;
    }

    .subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.94rem;
    }

    .actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(120deg, var(--brand) 0%, #178275 100%);
      box-shadow: 0 10px 20px rgba(15, 109, 99, 0.24);
      transition: transform 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .status {
      margin-bottom: 14px;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .status.error {
      color: var(--danger);
      font-weight: 700;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 920px;
    }

    th,
    td {
      text-align: left;
      padding: 12px 14px;
      border-bottom: 1px solid #ecf2f8;
      vertical-align: top;
      font-size: 0.9rem;
    }

    th {
      font-size: 0.78rem;
      color: #27425c;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      background: #f7fbff;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tbody tr:hover {
      background: #f9fcff;
    }

    .pill {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.76rem;
      font-weight: 700;
      color: #145851;
      background: #e9f8f5;
      border: 1px solid #bfe8e1;
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.82rem;
      color: #324960;
    }

    .empty {
      padding: 24px;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 760px) {
      .container {
        padding-top: 20px;
      }

      .subtitle {
        font-size: 0.88rem;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <header class="topbar">
      <div>
        <h1 class="title">AXEL'S GPR Admin</h1>
        <p class="subtitle">Recent estimate requests from your website contact form.</p>
      </div>
      <div class="actions">
        <button class="btn" id="refresh-btn" type="button">Refresh</button>
      </div>
    </header>

    <p id="status" class="status">Loading submissions...</p>

    <section class="card table-wrap" aria-label="Estimate requests table">
      <table>
        <thead>
          <tr>
            <th>Submitted</th>
            <th>Name</th>
            <th>Phone</th>
            <th>Email</th>
            <th>Service</th>
            <th>Message</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
      <div id="empty-state" class="empty" hidden>No submissions yet.</div>
    </section>
  </main>

  <script>
    const rows = document.getElementById('rows');
    const status = document.getElementById('status');
    const refreshBtn = document.getElementById('refresh-btn');
    const emptyState = document.getElementById('empty-state');

    const formatDate = (value) => {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return '-';
      }

      return new Intl.DateTimeFormat('en-US', {
        year: 'numeric',
        month: 'short',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      }).format(date);
    };

    const renderRows = (items) => {
      rows.innerHTML = '';

      if (!items.length) {
        emptyState.hidden = false;
        return;
      }

      emptyState.hidden = true;

      items.forEach((item) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="mono">${formatDate(item.createdAt)}</td>
          <td>${item.name || '-'}</td>
          <td>${item.phone || '-'}</td>
          <td>${item.email || '-'}</td>
          <td><span class="pill">${item.service || '-'}</span></td>
          <td>${item.message || '-'}</td>
        `;
        rows.appendChild(tr);
      });
    };

    const loadSubmissions = async () => {
      status.classList.remove('error');
      status.textContent = 'Loading submissions...';

      try {
        const response = await fetch('/api/admin/estimates?limit=120', {
          credentials: 'same-origin'
        });

        if (!response.ok) {
          throw new Error('Unable to fetch submissions');
        }

        const payload = await response.json();
        const items = Array.isArray(payload.data) ? payload.data : [];

        status.textContent = `Loaded ${items.length} submission(s).`;
        renderRows(items);
      } catch (_error) {
        status.classList.add('error');
        status.textContent = 'Could not load submissions. Check admin auth credentials and try again.';
        renderRows([]);
      }
    };

    refreshBtn.addEventListener('click', loadSubmissions);
    loadSubmissions();
  </script>
</body>
</html>
